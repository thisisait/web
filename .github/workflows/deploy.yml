name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    # Any deploy to main, including manual re-runs, re-pings IndexNow.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify IndexNow (Bing, Seznam, Yandex, Naver)
        env:
          INDEXNOW_KEY: fd3da1fe5cf8d13f3d7ba25a5b7ced34
          SITE: https://thisisait.eu
        run: |
          payload=$(cat <<JSON
          {
            "host": "thisisait.eu",
            "key": "${INDEXNOW_KEY}",
            "keyLocation": "${SITE}/${INDEXNOW_KEY}.txt",
            "urlList": [
              "${SITE}/",
              "${SITE}/cs/",
              "${SITE}/de/",
              "${SITE}/fr/"
            ]
          }
          JSON
          )
          echo "Submitting to IndexNow…"
          code=$(curl -s -o /tmp/indexnow.out -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "$payload")
          echo "HTTP ${code}"
          cat /tmp/indexnow.out || true
          # IndexNow accepts 200 or 202 as success; anything else is a warning.
          if [ "$code" != "200" ] && [ "$code" != "202" ]; then
            echo "::warning::IndexNow returned ${code} (non-blocking)"
          fi
